<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
        font-family: 'Poppins', sans-serif;
        background: #000;
        color: #fff;
        }

        .container {
        width: 85%;
        max-width: 900px;
        margin: auto;
        }

        /* Navbar */
        .navbar {
        padding: 1rem 0;
        border-bottom: 1px solid #111;
        }

        .nav-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        }

        .logo { font-weight: 700; }

        .nav-links {
        list-style: none;
        display: flex;
        gap: 20px;
        }

        .nav-links a {
        color: #fff;
        text-decoration: none;
        }

        .nav-links a.active {
        color: #fcbf49;
        border-bottom: 2px solid #fcbf49;
        }

        /* Contact Section */
        .contact {
        padding: 4rem 0;
        text-align: center;
        }

        .contact h2 {
        color: #fcbf49;
        margin-bottom: 1rem;
        }

        .contact p {
        color: #bbb;
        margin-bottom: 2rem;
        }

        .contact-box {
        background: #0a0a0a;
        padding: 2rem;
        border-radius: 10px;
        text-align: left;
        }

        .contact-box p {
        margin-bottom: 12px;
        font-size: 0.95rem;
        }

        .contact-box a {
        color: #fcbf49;
        text-decoration: none;
        }

        /* Footer */
        .footer {
        text-align: center;
        padding: 2rem 0;
        background: #0a0a0a;
        color: #aaa;
        margin-top: 2rem;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <header class="navbar">
    <div class="container nav-container">
        <div class="logo">KETAKSHI KOSHTI</div>
        <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a class="active" href="#">Contact</a></li>
        </ul>
    </div>
    </header>

    <!-- Contact Section -->
    <section class="contact container">
    <h2>Contact Me</h2>
    <p>Feel free to reach out for opportunities or collaborations</p>

    <div class="contact-box">
        <p><strong>Name:</strong> Ketakshi Koshti</p>
        <p><strong>Email:</strong> ketakshi9@gmail.com</p>
        <p><strong>Phone:</strong> +91 9926039298</p>
        <p><strong>Location:</strong> Indore, Madhya Pradesh</p>
        <p><strong>GitHub:</strong> 
        <a href="https://github.com/ketakshi9-alt" target="_blank">
            github.com/ketakshi9-alt
        </a>

    <footer class="footer">

</body>
